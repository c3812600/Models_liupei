name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # 你可以根据你的实际版本修改
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # 注意：iOS 编译需要 Apple 开发者证书。
      # 在没有配置证书的情况下，只能构建出无签名的 .app 产物（--no-codesign）。
      # 完整打包 ipa 需要在 GitHub Secrets 中配置证书和描述文件，并使用对应的 action 或脚本。
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      # 将构建出的 Runner.app 压缩以便下载
      - name: Compress Runner.app
        run: |
          cd build/ios/iphoneos
          zip -r Runner.app.zip Runner.app
          
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-app-unsigned
          path: build/ios/iphoneos/Runner.app.zip
